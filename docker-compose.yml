services:
  app:
    build: .
    container_name: football_events_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - vendor_data:/app/vendor
    working_dir: /app
    depends_on:
      - rabbitmq
      - ws

  rabbitmq:
    image: rabbitmq:4-management
    container_name: football_events_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  ws:
    build:
      context: ./ws
    container_name: football_events_ws
    ports:
      - "8081:8081"
    volumes:
      - ./ws:/app
      - ws_node_modules:/app/node_modules
    working_dir: /app
    depends_on:
      - rabbitmq

volumes:
  vendor_data:
  rabbitmq_data:
  ws_node_modules: